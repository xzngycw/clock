<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />

    <!-- 基础 meta 标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6366F1" />
    <meta name="description" content="面向低年级学生的时间学习教育应用" />

    <!-- PWA 相关 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="认识时间" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />

    <!-- 图标 -->
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <title>认识时间 - 时钟学习应用</title>

    <script>
      (function () {
        const redirect = new URLSearchParams(window.location.search).get('p');
        if (!redirect) return;
        const normalized = redirect.startsWith('/') ? redirect : `/${redirect}`;
        const query = new URLSearchParams(window.location.search);
        query.delete('p');
        const nextSearch = query.toString();
        const nextUrl = `${window.location.pathname.replace(/\/$/, '')}${normalized}${nextSearch ? `?${nextSearch}` : ''}${window.location.hash}`;
        window.history.replaceState(null, '', nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
